name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  # ─── Qualité du code ──────────────────────────────────────────────
  quality:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

      - name: Vérification TypeScript
        run: npx tsc --noEmit

  # ─── Tests unitaires ──────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires (Vitest)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests unitaires
        run: npm run test:run

      - name: Rapport de couverture
        run: npm run coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ─── Build ────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Build de production
        run: npm run build

      - name: Upload du build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
